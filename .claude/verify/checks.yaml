# .claude/verify/checks.yaml — the registry. The ONLY definition of "green".
# Generated by /verify-init from planning/00-master-plan.md. Do not hand-edit the check set without
# updating the master plan to match — the master plan is the spec, this is its compiled form.
#
# Tier: lite. No ground-truth/*.yaml package exists (see planning/00-master-plan.md, "Tier: lite" —
# nothing here is a formula a human could get wrong on paper), so no `covers:` fields are used.

checks:
  - id: INTEGRITY.frozen
    tags: [always]
    cmd: bash .claude/verify/integrity.sh
    expect_exit: 0

  # --- Phase 0: Design direction -----------------------------------------------------------------
  - id: STATIC.mockup-files
    tags: [static, phase0]
    cmd: >-
      test -f design-mockups/direction-a/homepage.html &&
      test -f design-mockups/direction-a/card.html &&
      test -f design-mockups/direction-a/navbar.html &&
      test -f design-mockups/direction-b/homepage.html &&
      test -f design-mockups/direction-b/card.html &&
      test -f design-mockups/direction-b/navbar.html
    expect_exit: 0

  - id: STATIC.mockup-html-valid
    tags: [static, phase0]
    cmd: npx html-validate "design-mockups/**/*.html"
    expect_exit: 0

  - id: STATIC.mockup-responsive
    tags: [static, phase0]
    cmd: npx playwright test tests/responsive/mockups.spec.ts
    expect_exit: 0

  # --- Phase 1: Static scaffold ------------------------------------------------------------------
  - id: STATIC.html-valid
    tags: [static, phase1]
    cmd: npx html-validate "*.html" "about/**/*.html"
    expect_exit: 0

  - id: STATIC.responsive-no-overflow
    tags: [static, phase1]
    cmd: npx playwright test tests/responsive/core-pages.spec.ts --grep "home|about"
    expect_exit: 0

  - id: STATIC.nav-footer-structure
    tags: [static, phase1]
    cmd: npx playwright test tests/structure/nav-footer.spec.ts
    expect_exit: 0

  # --- Phase 2: Gallery ---------------------------------------------------------------------------
  - id: STATIC.gallery-html-valid
    tags: [static, phase2]
    cmd: npx html-validate "gallery/**/*.html"
    expect_exit: 0

  - id: STATIC.gallery-iframe-present
    tags: [static, phase2]
    cmd: npx playwright test tests/structure/gallery.spec.ts
    expect_exit: 0

  - id: STATIC.gallery-responsive
    tags: [static, phase2]
    cmd: npx playwright test tests/responsive/core-pages.spec.ts --grep gallery
    expect_exit: 0

  # --- Phase 3: Drills & Sessions library + diagram system ----------------------------------------
  - id: DOMAIN.diagram-schema-valid
    tags: [domain, phase3]
    cmd: node scripts/validate-diagrams.mjs
    expect_exit: 0

  - id: STATIC.diagram-render-smoke
    tags: [static, phase3]
    cmd: npx playwright test tests/e2e/session-diagrams.spec.ts
    expect_exit: 0

  - id: STATIC.theme-filter
    tags: [static, phase3]
    cmd: npx playwright test tests/e2e/theme-filter.spec.ts
    expect_exit: 0

  - id: STATIC.drills-html-valid
    tags: [static, phase3]
    cmd: npx html-validate "drills/**/*.html"
    expect_exit: 0

  # --- Phase 4: AI Drill Builder -------------------------------------------------------------------
  - id: DOMAIN.worker-unit-tests
    tags: [domain, phase4]
    cmd: npx vitest run worker/
    expect_exit: 0

  - id: DOMAIN.tool-schema-valid
    tags: [domain, phase4]
    cmd: node scripts/validate-tool-schema.mjs
    expect_exit: 0

  - id: E2E.drill-builder-flow
    tags: [e2e, phase4]
    cmd: npx playwright test tests/e2e/drill-builder.spec.ts
    expect_exit: 0

  - id: JUDGE.live-generation-quality
    tags: [phase4]
    type: agent
    rubric: >
      Run the live drill-builder endpoint (real OpenRouter call, anthropic/claude-haiku-4.5:exacto) for:
      5, 6, 7, and 8 players; each of the 8 named themes plus "surprise me"; and one generation with a
      wet-weather/low-turnout note. For each run, confirm a plan renders and record whether every
      drill's diagram rendered or degraded (see 06-SVG-DIAGRAM-SYSTEM.md's graceful-degrade path). PASS
      only if every run produces a rendered plan (zero total failures) and the diagram-degrade rate
      across all runs is under 10%. Quote the actual failures/degraded drills as evidence for a FAIL
      verdict. Note: this check makes real, billed OpenRouter API calls (~13 generations, ≈$0.25/run).

  # --- Phase 5: Domain + polish --------------------------------------------------------------------
  - id: STATIC.favicon-present
    tags: [static, phase5]
    cmd: test -f assets/favicon.png
    expect_exit: 0

  - id: STATIC.images-optimized
    tags: [static, phase5]
    cmd: node scripts/check-image-sizes.mjs
    expect_exit: 0

  - id: E2E.lighthouse-perf
    tags: [e2e, phase5]
    cmd: node scripts/run-lighthouse.mjs
    expect_exit: 0

  - id: E2E.cross-browser-smoke
    tags: [e2e, phase5]
    # webkit deliberately excluded: confirmed at verify-init time that it cannot launch on this
    # machine (missing system deps, needs `sudo apt-get install libicu74 libjpeg-turbo8 libwoff1` —
    # no sudo available in this environment). chromium and firefox both confirmed working. Real
    # Safari/iOS coverage is already a Phase 5 human checkpoint below, not this check — webkit-the-
    # engine was only ever an approximation of that, never a substitute for it.
    cmd: npx playwright test tests/e2e/smoke.spec.ts --project=chromium --project=firefox
    expect_exit: 0
