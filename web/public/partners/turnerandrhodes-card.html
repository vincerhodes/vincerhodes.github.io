<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Turner &amp; Rhodes — Medium Rectangle 300x250</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap");

  :root {
    --forest-green: #21472E;
    --near-black-green: #152218;
    --white: #FFFFFF;
    --sage: #8FA893;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 300px;
    height: 250px;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  .banner {
    width: 300px;
    height: 250px;
    background: linear-gradient(160deg, var(--forest-green), var(--near-black-green));
    border: 1px solid var(--sage);
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 22px 24px 18px;
    text-decoration: none;
  }

  .monogram {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 1.5px solid var(--sage);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Lora", Georgia, serif;
    font-weight: 600;
    font-size: 17px;
    color: var(--sage);
    margin-bottom: 12px;
  }

  .firm {
    font-family: "Lora", Georgia, serif;
    font-weight: 700;
    font-size: 19px;
    line-height: 1.25;
  }

  .subhead {
    font-size: 11.5px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--sage);
    margin-top: 6px;
  }

  .rule {
    width: 36px;
    height: 1px;
    background: var(--sage);
    margin: 14px 0;
    opacity: 0.6;
  }

  .body-copy {
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--white);
    opacity: 0.92;
  }

  .cta {
    margin-top: auto;
    padding-top: 14px;
    font-family: "Lora", Georgia, serif;
    font-size: 12px;
    font-weight: 600;
    border-top: 1px solid var(--sage);
    width: 100%;
  }

  .cta .fee-line {
    color: var(--sage);
    font-weight: 500;
    display: block;
    margin-top: 4px;
    font-size: 11px;
  }
</style>
</head>
<body>
  <a class="banner" href="https://rightcourtsc.com/turnerandrhodes/">
    <div class="monogram">T&amp;R</div>
    <div class="firm">Turner &amp; Rhodes Solicitors</div>
    <div class="subhead">Sports &amp; Personal Injury Specialists</div>
    <div class="rule"></div>
    <div class="body-copy">Boast to the ribs. Drop shot to the knee. Whatever went wrong on court, we've billed for it.</div>
    <div class="cta">
      Consultations court-side &mdash; Wed 18:00&ndash;20:00 &amp; Sat 09:00&ndash;11:00
      <span class="fee-line">No boast, no win, no fee.</span>
    </div>
  </a>
</body>
</html>
