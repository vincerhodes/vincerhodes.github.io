<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Turner &amp; Rhodes — Leaderboard 728x90</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap");

  :root {
    --forest-green: #21472E;
    --near-black-green: #152218;
    --white: #FFFFFF;
    --sage: #8FA893;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 728px;
    height: 90px;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  .banner {
    width: 728px;
    height: 90px;
    background: linear-gradient(135deg, var(--forest-green), var(--near-black-green));
    border: 1px solid var(--sage);
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 22px;
    color: var(--white);
  }

  .monogram {
    flex: 0 0 auto;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--sage);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Lora", Georgia, serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.5px;
    color: var(--sage);
  }

  .divider {
    flex: 0 0 auto;
    width: 1px;
    height: 40px;
    background: var(--sage);
    opacity: 0.5;
  }

  .copy {
    flex: 1 1 auto;
    min-width: 0;
  }

  .firm {
    font-family: "Lora", Georgia, serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.2px;
    white-space: nowrap;
  }

  .subhead {
    font-size: 10.5px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--sage);
    margin-top: 4px;
    white-space: nowrap;
  }

  .tagline {
    font-size: 12px;
    color: var(--sage);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .cta {
    flex: 0 0 auto;
    border: 1px solid var(--sage);
    border-radius: 999px;
    padding: 8px 16px;
    font-family: "Lora", Georgia, serif;
    font-size: 12.5px;
    font-weight: 600;
    white-space: nowrap;
    color: var(--white);
  }
</style>
</head>
<body>
  <a class="banner" href="https://rightcourtsc.com/turnerandrhodes/" style="text-decoration:none;">
    <div class="monogram">T&amp;R</div>
    <div class="divider"></div>
    <div class="copy">
      <div class="firm">Turner &amp; Rhodes Solicitors</div>
      <div class="subhead">Sports &amp; Personal Injury Specialists</div>
    </div>
    <div class="cta">No boast, no win, no fee &rarr;</div>
  </a>
</body>
</html>
